name: collect-prices
on:
  schedule:
    - cron: '17 6,18 * * *'   # 2x daily, offset from :00 to dodge GH cron congestion
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: collect
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Sample prices
        run: python3 collect.py
      - name: Commit data
        run: |
          git config user.name 'steamcozy-bot'
          git config user.email 'suggest@steamcozy.com'
          git add data
          git commit -m "price sample $(date -u +'%Y-%m-%d %H:%M') UTC" || { echo 'nothing to commit'; exit 0; }
          git push
